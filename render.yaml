services:
  - type: web
    name: geoai-backend
    env: python
    pythonVersion: 3.9
    buildCommand: "pip install --default-timeout=1000 --retries 5 --extra-index-url https://google-coral.github.io/py-repo/ -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT"